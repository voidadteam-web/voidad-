<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidAd DNS Proxy</title>
  <style>
    :root {
      --bg: #0a0e17;
      --panel: #111827;
      --border: #1f2937;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --accent: #22d3ee;
      --accent-dim: #0891b2;
      --danger: #f87171;
      --success: #34d399;
      --warning: #fbbf24;
      --mono: "SF Mono", "Fira Code", ui-monospace, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    header h1 {
      font-size: 1.25rem;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    header h1 span { color: var(--accent); }

    .badge {
      font-size: 0.75rem;
      padding: 0.25rem 0.625rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--mono);
    }

    main {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      gap: 1.25rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 0.75rem;
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.25rem;
      font-family: var(--mono);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 1.25rem;
    }

    @media (max-width: 900px) {
      .grid-2 { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    .panel-header {
      padding: 0.875rem 1rem;
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      font-size: 0.875rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-body { padding: 1rem; }

    form {
      display: flex;
      gap: 0.5rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 0.625rem 0.75rem;
      font-size: 0.875rem;
      font-family: var(--mono);
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent-dim);
    }

    button {
      background: var(--accent-dim);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.625rem 1rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover { background: var(--accent); color: #000; }

    button.ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    button.ghost:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    button.danger {
      background: transparent;
      border: 1px solid #7f1d1d;
      color: var(--danger);
      padding: 0.25rem 0.5rem;
      font-size: 0.75rem;
    }

    .domain-list {
      list-style: none;
      max-height: 320px;
      overflow-y: auto;
      margin-top: 0.75rem;
    }

    .domain-list li {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.8125rem;
    }

    .domain-list li:last-child { border-bottom: none; }

    .log-table-wrap {
      max-height: 420px;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8125rem;
    }

    th, td {
      text-align: left;
      padding: 0.5rem 0.625rem;
      border-bottom: 1px solid var(--border);
    }

    th {
      color: var(--muted);
      font-weight: 500;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      position: sticky;
      top: 0;
      background: var(--panel);
    }

    td.mono { font-family: var(--mono); }

    .pill {
      display: inline-block;
      padding: 0.125rem 0.5rem;
      border-radius: 999px;
      font-size: 0.6875rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .pill.blocked { background: #450a0a; color: var(--danger); }
    .pill.forwarded { background: #064e3b; color: var(--success); }
    .pill.error { background: #451a03; color: var(--warning); }

    .empty {
      color: var(--muted);
      font-size: 0.875rem;
      padding: 1rem 0;
      text-align: center;
    }

    .error-banner {
      display: none;
      background: #450a0a;
      border: 1px solid #7f1d1d;
      color: var(--danger);
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>
  <header>
    <h1><span>VoidAd</span> DNS Proxy</h1>
    <span class="badge" id="dns-badge">127.0.0.1:53</span>
  </header>

  <main>
    <div class="error-banner" id="error-banner"></div>

    <section class="stats">
      <div class="stat">
        <div class="stat-label">Blocked</div>
        <div class="stat-value" id="stat-blocked">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Forwarded</div>
        <div class="stat-value" id="stat-forwarded">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Errors</div>
        <div class="stat-value" id="stat-error">0</div>
      </div>
      <div class="stat">
        <div class="stat-label">Blocklist</div>
        <div class="stat-value" id="stat-blocklist">0</div>
      </div>
    </section>

    <div class="grid-2">
      <section class="panel">
        <div class="panel-header">Blocklist</div>
        <div class="panel-body">
          <form id="add-form">
            <input type="text" id="domain-input" placeholder="example-ads.com" autocomplete="off" spellcheck="false" />
            <button type="submit">Add</button>
          </form>
          <ul class="domain-list" id="domain-list"></ul>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <span>Request Log</span>
          <button class="ghost" id="clear-logs">Clear</button>
        </div>
        <div class="panel-body log-table-wrap">
          <table>
            <thead>
              <tr>
                <th>Time</th>
                <th>Domain</th>
                <th>Type</th>
                <th>Action</th>
                <th>Client</th>
              </tr>
            </thead>
            <tbody id="log-body"></tbody>
          </table>
          <div class="empty" id="log-empty" style="display:none">No requests yet</div>
        </div>
      </section>
    </div>
  </main>

  <script>
    const domainInput = document.getElementById("domain-input");
    const domainList = document.getElementById("domain-list");
    const logBody = document.getElementById("log-body");
    const logEmpty = document.getElementById("log-empty");
    const errorBanner = document.getElementById("error-banner");

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.style.display = "block";
      setTimeout(() => { errorBanner.style.display = "none"; }, 4000);
    }

    function formatTime(iso) {
      return new Date(iso).toLocaleTimeString();
    }

    async function api(path, options = {}) {
      const res = await fetch(path, {
        headers: { "Content-Type": "application/json" },
        ...options,
      });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.detail || `Request failed (${res.status})`);
      }
      return res.json();
    }

    function renderBlocklist(blocklist) {
      domainList.innerHTML = "";
      const domains = blocklist.domains ?? [];
      const count = blocklist.count ?? domains.length;
      if (!domains.length) {
        domainList.innerHTML = '<li class="empty">No blocked domains</li>';
        return;
      }
      if (blocklist.truncated) {
        const note = document.createElement("li");
        note.className = "empty";
        note.textContent = `Showing ${domains.length.toLocaleString()} of ${count.toLocaleString()} domains (OISD Big)`;
        domainList.appendChild(note);
      }
      for (const domain of domains) {
        const li = document.createElement("li");
        li.innerHTML = `<span>${domain}</span>`;
        const btn = document.createElement("button");
        btn.className = "danger";
        btn.textContent = "Remove";
        btn.onclick = () => removeDomain(domain);
        li.appendChild(btn);
        domainList.appendChild(li);
      }
    }

    function renderLogs(entries) {
      logBody.innerHTML = "";
      logEmpty.style.display = entries.length ? "none" : "block";
      for (const entry of entries) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatTime(entry.timestamp)}</td>
          <td class="mono">${entry.domain}</td>
          <td class="mono">${entry.qtype}</td>
          <td><span class="pill ${entry.action}">${entry.action}</span></td>
          <td class="mono">${entry.client}</td>
        `;
        logBody.appendChild(tr);
      }
    }

    async function refresh() {
      try {
        const [stats, blocklist, logs] = await Promise.all([
          api("/api/stats"),
          api("/api/blocklist"),
          api("/api/logs?limit=100"),
        ]);

        document.getElementById("dns-badge").textContent = stats.dns;
        document.getElementById("stat-blocked").textContent = stats.requests.blocked ?? 0;
        document.getElementById("stat-forwarded").textContent = stats.requests.forwarded ?? 0;
        document.getElementById("stat-error").textContent = stats.requests.error ?? 0;
        document.getElementById("stat-blocklist").textContent = stats.blocklist_count;

        renderBlocklist(blocklist);
        renderLogs(logs.entries);
      } catch (err) {
        showError(err.message);
      }
    }

    async function addDomain(domain) {
      await api("/api/blocklist", {
        method: "POST",
        body: JSON.stringify({ domain }),
      });
      domainInput.value = "";
      await refresh();
    }

    async function removeDomain(domain) {
      await api(`/api/blocklist/${encodeURIComponent(domain)}`, { method: "DELETE" });
      await refresh();
    }

    document.getElementById("add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const domain = domainInput.value.trim();
      if (!domain) return;
      try {
        await addDomain(domain);
      } catch (err) {
        showError(err.message);
      }
    });

    document.getElementById("clear-logs").addEventListener("click", async () => {
      try {
        await api("/api/logs", { method: "DELETE" });
        await refresh();
      } catch (err) {
        showError(err.message);
      }
    });

    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>
