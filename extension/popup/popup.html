<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidAd</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      background: #050a0a;
      color: #e5e7eb;
      padding: 14px;
    }
    .logo { color: #00ff99; font-weight: 700; font-size: 16px; }
    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1a3a32;
      background: #0d1f18;
      font-size: 12px;
    }
    .on { color: #00ff99; }
    .off { color: #f87171; }
    .stat { margin-top: 8px; color: #6b8f7a; font-size: 11px; }
    button {
      margin-top: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 8px;
      background: #0891b2;
      color: white;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #00ff99; color: #000; }
    a {
      display: block;
      margin-top: 10px;
      text-align: center;
      color: #00ff99;
      font-size: 11px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="logo">VoidAd</div>
  <div class="status">
    <div id="protection">Loading…</div>
    <div class="stat" id="stats"></div>
  </div>
  <button id="toggle" type="button">Toggle Protection</button>
  <a id="dashboard" href="https://voidad.com/en/dashboard" target="_blank" rel="noreferrer">Open Dashboard</a>
  <script src="popup.js"></script>
</body>
</html>
